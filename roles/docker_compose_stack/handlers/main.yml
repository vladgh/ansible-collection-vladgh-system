---
- name: Reload SystemD
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart SystemD Service for Modified Stack
  ansible.builtin.systemd:
    name: "docker-compose@{{ stack_name }}.service"
    state: restarted
  register: docker_compose_stack_restart_result
  failed_when: false
  # Below we use a custom loop to only restart services for stacks that had changes in their configuration or dependencies
  loop: >-
    {{
      (
        (docker_compose_stack_env_result.results | default([]) | selectattr('changed', 'equalto', true) | map(attribute='item.name') | list)
        +
        (docker_compose_stack_file_result.results | default([]) | selectattr('changed', 'equalto', true) | map(attribute='item.name') | list)
        +
        (docker_compose_stack_mount_result.results | default([]) | selectattr('changed', 'equalto', true) | map(attribute='item.name') | list)
      ) | unique
    }}
  loop_control:
    loop_var: stack_name
    label: "{{ stack_name }}"

---
- name: Restart SystemD Service for Modified Stack
  listen: Restart SystemD Service for Modified Stack
  ansible.builtin.systemd:
    name: "docker-compose@{{ stack_name }}.service"
    state: restarted
  register: docker_compose_restart_result
  failed_when: false
  loop: >-
    {{
      (
        (docker_compose_stack_env_result.results | default([]) | selectattr('changed', 'equalto', true) | map(attribute='item.name') | list)
        +
        (docker_compose_stack_file_result.results | default([]) | selectattr('changed', 'equalto', true) | map(attribute='item.name') | list)
        +
        (docker_compose_stack_mount_result.results | default([]) | selectattr('changed', 'equalto', true) | map(attribute='item.name') | list)
      ) | unique
    }}
  loop_control:
    loop_var: stack_name
    label: "{{ stack_name }}"

- name: Show failed compose restarts
  ansible.builtin.debug:
    msg: >-
      Stack {{ item.item }} failed to restart:
      {{ item.msg | default(item.stderr, true) }}
  when: item.failed
  loop: "{{ docker_compose_restart_result.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"

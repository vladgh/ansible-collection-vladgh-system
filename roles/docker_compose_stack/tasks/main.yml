---
- name: Ensure stack directory exists
  ansible.builtin.file:
    path: "{{ docker_compose_stack_path }}/{{ item.name }}"
    state: directory
    mode: '0755'
  when: item.name is defined and item.name | length > 0
  loop: "{{ docker_compose_stack }}"
  loop_control:
    label: "{{ item.name }}"

- name: Configure DotEnv
  ansible.builtin.copy:
    content: |
      # DO NOT USE QUOTES TO ENCLOSE THE VALUES
      # https://docs.docker.com/compose/env-file/#syntax-rules
      {% for env_item in all_vars | dict2items %}
      {{ env_item.key }}={{ env_item.value }}
      {% endfor %}
    dest: "{{ docker_compose_stack_path }}/{{ item.name }}/.env"
    owner: root
    group: root
    mode: '0644'
  vars:
    all_vars: "{{ item.env | default({}) }}"
  when: >
    ( item.name is defined and item.name | length > 0 ) and
    ( item.env is defined and item.env | length > 0 )
  loop: "{{ docker_compose_stack }}"
  loop_control:
    label: "{{ item.name }}"
  register: docker_compose_stack_env_result
  notify: Restart SystemD Service for Modified Stack

- name: Copy files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/files/appstack/{{ inventory_hostname }}/{{ item.name }}.yml"
    dest: "{{ docker_compose_stack_path }}/{{ item.name }}/compose.yml"
    decrypt: true
    owner: root
    group: root
    mode: '0644'
  when: item.name is defined and item.name | length > 0
  loop: "{{ docker_compose_stack }}"
  loop_control:
    label: "{{ item.name }}"
  register: docker_compose_stack_file_result
  notify: Restart SystemD Service for Modified Stack

- name: Create docker networks
  ansible.builtin.command: /usr/bin/docker network create {{ item.name }}
  register: docker_compose_stack_network_create
  changed_when: "'Error' not in docker_compose_stack_network_create.stderr"
  failed_when: "'already exists' not in docker_compose_stack_network_create.stderr and docker_compose_stack_network_create.rc != 0"
  when: item.name is defined and item.name | length > 0
  loop: "{{ docker_compose_stack_networks }}"
  loop_control:
    label: "{{ item.name }}"

- name: Create systemd service file for stack
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Docker Compose Application Service - %I
      Documentation=https://docs.docker.com/compose/
      Requires=docker.service network-online.target
      After=network-online.target docker.service
      PartOf=docker-compose.target
      StartLimitIntervalSec=0
      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory={{ docker_compose_stack_path }}/%I
      ExecStartPre=/bin/sh -c 'until curl -s --connect-timeout 5 https://registry-1.docker.io/v2/ >/dev/null; do sleep 5; done'
      ExecStartPre=/usr/bin/docker compose config --quiet
      ExecStartPre=/usr/bin/docker compose pull --quiet
      ExecStart=/usr/bin/docker compose up --detach --remove-orphans
      ExecStop=/usr/bin/docker compose down
      Restart=on-failure
      RestartSec=10
      TimeoutStartSec=10min
      [Install]
      WantedBy=multi-user.target
    dest: "/etc/systemd/system/docker-compose@.service"
    owner: root
    group: root
    mode: '0644'
  when: docker_compose_stack is defined and docker_compose_stack | length > 0
  notify:
    - Reload SystemD
    - Restart SystemD Service for Modified Stack

- name: Create systemd target file for all stacks
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Docker Compose Stacks Target
      Documentation=https://docs.docker.com/compose/
      {% for stack in docker_compose_stack %}
      {% if stack.name is defined and stack.name | length > 0 %}
      Wants=docker-compose@{{ stack.name }}.service
      After=docker-compose@{{ stack.name }}.service
      {% endif %}
      {% endfor %}
      [Install]
      WantedBy=multi-user.target
    dest: "/etc/systemd/system/docker-compose.target"
    owner: root
    group: root
    mode: '0644'
  when: docker_compose_stack is defined and docker_compose_stack | length > 0
  notify:
    - Reload SystemD

- name: Ensure systemd drop-in directory exists for compose stacks
  ansible.builtin.file:
    path: "/etc/systemd/system/docker-compose@{{ item.name }}.service.d"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: item.require_mount_units is defined and item.require_mount_units | length > 0
  loop: "{{ docker_compose_stack }}"
  loop_control:
    label: "{{ item.name }}"

- name: Create systemd mount dependency override for stacks
  ansible.builtin.copy:
    dest: "/etc/systemd/system/docker-compose@{{ item.name }}.service.d/override.conf"
    content: |
      [Unit]
      {% for unit in item.require_mount_units | default([]) %}
      Requires={{ unit }}
      After={{ unit }}
      BindsTo={{ unit }}
      {% endfor %}
    owner: root
    group: root
    mode: '0644'
  when: item.require_mount_units is defined and item.require_mount_units | length > 0
  loop: "{{ docker_compose_stack }}"
  loop_control:
    label: "{{ item.name }}"
  register: docker_compose_stack_mount_result
  notify:
    - Reload SystemD
    - Restart SystemD Service for Modified Stack

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable systemd service for stack
  ansible.builtin.systemd:
    name: "docker-compose@{{ item.name }}.service"
    enabled: true
  when: item.name is defined and item.name | length > 0
  loop: "{{ docker_compose_stack }}"
  loop_control:
    label: "{{ item.name }}"

- name: Record failed compose restarts
  ansible.builtin.set_fact:
    docker_compose_stack_runtime_failures: >-
      {{
        (docker_compose_stack_runtime_failures | default([]))
        +
        [
          {
            'host': inventory_hostname,
            'service': item.stack_name | default(item.item),
            'message': item.msg | default(item.stderr, true)
          }
        ]
      }}
  loop: >-
    {{
      docker_compose_restart_result.results
      | default([])
      | selectattr('failed', 'defined')
      | selectattr('failed', 'equalto', true)
      | list
    }}

- name: Report failed compose restarts
  ansible.builtin.debug:
    msg: >-
      Stack {{ item.stack_name | default(item.item) }} failed:
      {{ item.msg | default(item.stderr, true) }}
  loop: >-
    {{
      docker_compose_restart_result.results
      | default([])
      | selectattr('failed', 'defined')
      | selectattr('failed', 'equalto', true)
      | list
    }}
